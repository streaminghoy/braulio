<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retorno P2P - Reconexión Automática</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; }
        
        /* EMISOR - Igual que antes, simple y estable */
        .broadcast { display: none; min-height: 100vh; flex-direction: column; }
        .broadcast.active { display: flex; }
        
        header { background: #111; padding: 15px; border-bottom: 2px solid #ff6b00; }
        h1 { color: #ff6b00; font-size: 20px; }
        
        .content { padding: 20px; max-width: 900px; margin: 0 auto; width: 100%; }
        .card { background: #141414; border: 1px solid #333; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        
        .preview { background: #000; border-radius: 8px; aspect-ratio: 16/9; margin-bottom: 15px; position: relative; overflow: hidden; border: 2px solid #333; }
        .preview video { width: 100%; height: 100%; object-fit: contain; display: block; }
        .badge-res { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #0f0; padding: 5px 10px; border-radius: 4px; font-family: monospace; font-size: 12px; display: none; }
        
        .btns { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; background: #2a2a2a; color: #fff; cursor: pointer; font-weight: 600; font-size: 14px; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        button.primary { background: #ff6b00; color: #000; }
        button.active { background: #2a1f0f; border: 2px solid #ff6b00; }
        
        .status-bar { background: #1a1a1a; padding: 10px 15px; margin: -20px -20px 20px -20px; border-bottom: 1px solid #333; font-size: 13px; color: #888; }
        .status-bar.online { color: #0f0; }
        
        input { width: 100%; padding: 12px; background: #0f0f0f; border: 1px solid #444; color: #fff; border-radius: 6px; margin-bottom: 10px; font-family: monospace; font-size: 14px; }
        
        .reporter { background: #0f0f0f; border: 1px solid #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .reporter-id { color: #0f0; font-family: monospace; font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .reporter-url { font-size: 12px; color: #666; word-break: break-all; margin-bottom: 10px; background: #1a1a1a; padding: 8px; border-radius: 4px; }
        .reporter-status { font-size: 12px; color: #888; }
        .reporter-status.connected { color: #0f0; }
        .reporter-status.error { color: #f00; }
        
        .row { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        
        /* RECEPTOR - CON RECONEXIÓN AUTOMÁTICA */
        .receiver { display: none; width: 100vw; height: 100vh; background: #000; position: relative; }
        .receiver.active { display: block; }
        .receiver video { width: 100%; height: 100%; object-fit: contain; display: block; }
        
        /* Estados del receptor */
        .state-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 10;
            transition: opacity 0.3s;
        }
        .state-overlay.hidden { opacity: 0; pointer-events: none; }
        .state-overlay.minimal { background: rgba(0,0,0,0.7); }
        
        .spinner { width: 50px; height: 50px; border: 4px solid #222; border-top-color: #ff6b00; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .status-title { color: #fff; font-size: 22px; font-weight: bold; margin-bottom: 8px; text-align: center; }
        .status-sub { color: #888; font-size: 14px; text-align: center; max-width: 80%; line-height: 1.4; }
        .status-tech { color: #555; font-size: 12px; margin-top: 15px; font-family: monospace; }
        
        .reconnecting-badge { 
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%); 
            background: #ff6b00; color: #000; padding: 8px 20px; border-radius: 20px; 
            font-weight: bold; display: none; align-items: center; gap: 8px; z-index: 5;
            animation: pulse 2s infinite;
        }
        .reconnecting-badge.visible { display: flex; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.8} }
        .mini-spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 1s linear infinite; }
        
        .top-info { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; 
            border-left: 3px solid #ff6b00; z-index: 5;
        }
        .top-info h3 { color: #ff6b00; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; }
        .top-info .id { color: #0f0; font-family: monospace; font-size: 18px; font-weight: bold; }
        .top-info .state { color: #888; font-size: 12px; margin-top: 5px; }
        .top-info .state.connected { color: #0f0; }
        .top-info .state.reconnecting { color: #ff6b00; }
        
        .btn-fs { position: absolute; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: #ff6b00; border: none; color: #000; font-size: 24px; cursor: pointer; z-index: 5; }
        
        .error-box { background: rgba(255,0,0,0.2); border: 1px solid #f00; color: #fff; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; max-width: 80%; }
    </style>
</head>
<body>

    <!-- EMISOR -->
    <div id="broadcast" class="broadcast">
        <header>
            <h1>📡 RETORNO P2P (Emisor)</h1>
        </header>
        
        <div class="content">
            <div class="card">
                <div id="srvStatus" class="status-bar">Conectando...</div>
                
                <div class="preview">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div id="resBadge" class="badge-res">--</div>
                </div>
                
                <div class="btns">
                    <button onclick="startCam('vmix')" id="btn-vmix">🎥 vMix/OBS</button>
                    <button onclick="startCam('screen')" id="btn-screen">🖥️ Pantalla</button>
                    <button onclick="startCam('camera')" id="btn-camera">📷 Cámara</button>
                    <button onclick="toggleQuality()" id="btn-quality" style="margin-left: auto; background: #1a1a1a;">⚙️ 360p</button>
                </div>
                
                <div style="font-size: 13px; color: #666; margin-top: 10px;">
                    El stream nunca se detiene automáticamente. Si un reportero se cae, se reconecta solo.
                </div>
            </div>
            
            <div class="card">
                <h3 style="margin-bottom: 15px; color: #ff6b00;">Agregar Reportero</h3>
                <input type="text" id="repId" placeholder="Nombre (ej: JUAN1)" onkeypress="if(event.key==='Enter')addRep()">
                <button class="primary" onclick="addRep()" id="btnAdd" disabled style="width: 100%;">CREAR REPORTERO</button>
                
                <div id="repList" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <!-- RECEPTOR CON RECONEXIÓN AUTOMÁTICA -->
    <div id="receiver" class="receiver">
        <!-- Estados -->
        <div id="stateOverlay" class="state-overlay">
            <div class="spinner" id="mainSpinner"></div>
            <div class="status-title" id="statusTitle">Iniciando...</div>
            <div class="status-sub" id="statusSub">Conectando al servidor</div>
            <div class="status-tech" id="statusTech">ID: --</div>
            <div id="errorBox" class="error-box" style="display: none;"></div>
        </div>
        
        <div id="reconnectingBadge" class="reconnecting-badge">
            <div class="mini-spinner"></div>
            <span>Reconectando automáticamente...</span>
        </div>
        
        <!-- Video -->
        <video id="remoteVideo" autoplay playsinline></video>
        
        <!-- Info -->
        <div class="top-info">
            <h3>MI ID DE REPORTERO</h3>
            <div class="id" id="displayId">--</div>
            <div class="state" id="connState">Iniciando...</div>
        </div>
        
        <button class="btn-fs" onclick="toggleFs()">⛶</button>
    </div>

    <script>
        // CONFIG
        const quality = {
            '360p': { w: 640, h: 360, fps: 20 },
            '480p': { w: 854, h: 480, fps: 25 },
            '720p': { w: 1280, h: 720, fps: 30 }
        };
        let currQuality = '360p';
        let localStream = null;
        let peer = null;
        let reps = [];
        let currentCam = null;
        
        // MODO
        const params = new URLSearchParams(location.search);
        const isReceiver = params.has('id');
        const myId = params.get('id');
        
        if (isReceiver) {
            document.getElementById('broadcast').style.display = 'none';
            document.getElementById('receiver').classList.add('active');
            document.getElementById('displayId').textContent = myId;
            document.getElementById('statusTech').textContent = 'ID: ' + myId;
            initReceiver();
        } else {
            document.getElementById('broadcast').classList.add('active');
            initBroadcast();
        }
        
        // =================== EMISOR (SIMPLE Y ESTABLE) ===================
        function initBroadcast() {
            const mid = 'M-' + Math.random().toString(36).substr(2, 5).toUpperCase();
            peer = new Peer(mid, {
                host: '0.peerjs.com',
                port: 443,
                secure: true
            });
            
            peer.on('open', () => {
                document.getElementById('srvStatus').textContent = '✓ Online (' + mid + ')';
                document.getElementById('srvStatus').classList.add('online');
                document.getElementById('btnAdd').disabled = false;
            });
            
            peer.on('error', err => {
                document.getElementById('srvStatus').textContent = 'Error: ' + err.type;
            });
        }
        
        async function startCam(type) {
            try {
                // Solo reiniciar si cambiamos de tipo
                if (localStream && currentCam !== type) {
                    localStream.getTracks().forEach(t => t.stop());
                    localStream = null;
                }
                
                if (!localStream) {
                    currentCam = type;
                    const q = quality[currQuality];
                    
                    document.querySelectorAll('.btns button').forEach(b => b.classList.remove('active'));
                    document.getElementById('btn-' + type).classList.add('active');
                    
                    if (type === 'screen') {
                        localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                        localStream.getVideoTracks()[0].onended = () => {
                            localStream = null;
                            currentCam = null;
                            document.querySelectorAll('.btns button').forEach(b => b.classList.remove('active'));
                        };
                    } else {
                        localStream = await navigator.mediaDevices.getUserMedia({
                            video: { width: q.w, height: q.h, frameRate: q.fps },
                            audio: true
                        });
                    }
                    
                    document.getElementById('localVideo').srcObject = localStream;
                    const s = localStream.getVideoTracks()[0].getSettings();
                    document.getElementById('resBadge').textContent = s.width + 'x' + s.height;
                    document.getElementById('resBadge').style.display = 'block';
                }
                
                // Enviar a todos los reporteros pendientes
                reps.forEach(r => {
                    if (!r.call || r.status !== 'connected') {
                        callRep(r);
                    }
                });
                
            } catch(e) {
                alert('Error: ' + e.message);
            }
        }
        
        function toggleQuality() {
            const qs = Object.keys(quality);
            const i = qs.indexOf(currQuality);
            currQuality = qs[(i + 1) % qs.length];
            document.getElementById('btn-quality').textContent = '⚙️ ' + currQuality;
            if (currentCam) {
                // Guardar referencia y reiniciar
                const t = currentCam;
                currentCam = null;
                startCam(t);
            }
        }
        
        function addRep() {
            const id = document.getElementById('repId').value.trim().toUpperCase().replace(/[^A-Z0-9-]/g, '');
            if (!id) return;
            if (reps.find(r => r.id === id)) return alert('ID ya existe');
            
            const url = location.origin + location.pathname + '?id=' + id;
            const rep = { id, url, call: null, status: 'waiting' };
            reps.push(rep);
            
            renderReps();
            document.getElementById('repId').value = '';
            
            if (localStream) callRep(rep);
        }
        
        function callRep(rep) {
            if (!localStream || !peer) return;
            
            // Cerrar llamada anterior si existe
            if (rep.call) {
                try { rep.call.close(); } catch(e){}
                rep.call = null;
            }
            
            rep.status = 'conectando...';
            renderReps();
            
            try {
                console.log('Llamando a', rep.id);
                const call = peer.call(rep.id, localStream);
                rep.call = call;
                
                call.on('stream', () => {
                    rep.status = 'connected';
                    renderReps();
                });
                
                call.on('close', () => {
                    rep.call = null;
                    rep.status = 'esperando reconexión...';
                    renderReps();
                    // NO llamar automáticamente de vuelta - esperar que el receptor vuelva solo
                });
                
                call.on('error', () => {
                    rep.call = null;
                    rep.status = 'error';
                    renderReps();
                });
                
            } catch(e) {
                rep.status = 'error';
                renderReps();
            }
        }
        
        function renderReps() {
            const div = document.getElementById('repList');
            if (reps.length === 0) { div.innerHTML = ''; return; }
            
            div.innerHTML = reps.map(r => `
                <div class="reporter">
                    <div class="reporter-id">${r.id}</div>
                    <div class="reporter-url">${r.url}</div>
                    <div class="reporter-status ${r.status === 'connected' ? 'connected' : r.status.includes('error') ? 'error' : ''}">
                        Estado: ${r.status}
                    </div>
                    <div class="row">
                        <button onclick="copy('${r.url}')" style="font-size: 12px; padding: 6px 12px;">📋 Copiar Link</button>
                        ${r.status !== 'connected' ? `<button onclick="callRep(reps.find(x => x.id === '${r.id}'))" style="font-size: 12px; padding: 6px 12px; background: #0088ff;">↻ Intentar ahora</button>` : ''}
                        <button onclick="delRep('${r.id}')" style="font-size: 12px; padding: 6px 12px; background: #f00; margin-left: auto;">×</button>
                    </div>
                </div>
            `).join('');
        }
        
        function delRep(id) {
            const r = reps.find(x => x.id === id);
            if (r && r.call) try { r.call.close(); } catch(e){}
            reps = reps.filter(x => x.id !== id);
            renderReps();
        }
        
        async function copy(url) {
            try {
                await navigator.clipboard.writeText(url);
                alert('Link copiado!');
            } catch(e) {
                prompt('Copia este link:', url);
            }
        }
        
        // =================== RECEPTOR (RECONEXIÓN AUTOMÁTICA) ===================
        let currentCall = null;
        let reconnectInterval = null;
        let isConnected = false;
        
        function initReceiver() {
            updateState('Iniciando...', 'Conectando al servidor P2P', 'iniciando');
            
            peer = new Peer(myId, {
                host: '0.peerjs.com',
                port: 443,
                secure: true
            });
            
            peer.on('open', () => {
                console.log('Peer abierto');
                updateState('Esperando operador...', 'Mantén esta pantalla ABIERTA. Bloquear el teléfono cortará la señal.', 'esperando');
                document.getElementById('connState').textContent = 'Esperando señal...';
                document.getElementById('connState').className = 'state reconnecting';
                
                // Intentar mantener pantalla encendida (wake lock)
                requestWakeLock();
            });
            
            peer.on('error', err => {
                console.error('Peer error:', err);
                if (err.type === 'unavailable-id') {
                    updateState('Error: ID en uso', 'Este ID ya está siendo usado. Cierra esta pestaña y usa otro ID.', 'error');
                    showError('ID duplicado. Usa otro en la URL (?id=OTRO)');
                } else {
                    // Intentar reconectar peer
                    setTimeout(() => {
                        if (peer.disconnected) peer.reconnect();
                    }, 3000);
                }
            });
            
            peer.on('disconnected', () => {
                console.log('Peer desconectado, reconectando...');
                updateState('Reconectando...', 'Pérdida de conexión con servidor', 'reconectando');
                peer.reconnect();
            });
            
            // ESCUCHAR LLAMADAS (esto nunca debe dejar de funcionar)
            peer.on('call', call => {
                console.log('Llamada entrante!');
                handleCall(call);
            });
        }
        
        function handleCall(call) {
            // Si ya hay una llamada activa, cerrarla primero
            if (currentCall) {
                console.log('Cerrando llamada anterior');
                try { currentCall.close(); } catch(e){}
            }
            
            currentCall = call;
            
            // Siempre contestar
            call.answer(null);
            
            updateState('Conectando...', 'Recibiendo video del operador', 'conectando');
            hideReconnectingBadge();
            
            let streamReceived = false;
            
            call.on('stream', stream => {
                console.log('Stream recibido');
                streamReceived = true;
                isConnected = true;
                
                const video = document.getElementById('remoteVideo');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    console.log('Video listo:', video.videoWidth, 'x', video.videoHeight);
                    showVideo();
                    updateTopInfo('Conectado ✓', 'connected');
                };
                
                // Detectar si el track se corta (operador paró cámara)
                stream.getVideoTracks().forEach(track => {
                    track.onended = () => {
                        console.log('Track terminado');
                        handleDisconnect();
                    };
                });
            });
            
            call.on('close', () => {
                console.log('Call cerrada');
                if (isConnected) handleDisconnect();
            });
            
            call.on('error', err => {
                console.error('Call error:', err);
                handleDisconnect();
            });
            
            // Timeout de seguridad
            setTimeout(() => {
                if (!streamReceived) {
                    console.log('Timeout esperando stream');
                    handleDisconnect();
                }
            }, 15000);
        }
        
        function handleDisconnect() {
            isConnected = false;
            currentCall = null;
            
            // Ocultar video, mostrar estado reconectando
            document.getElementById('remoteVideo').style.opacity = '0.3';
            showReconnectingBadge();
            updateTopInfo('Reconectando...', 'reconnecting');
            
            // El receptor ahora espera pacientemente a que el peer.on('call') capture una nueva llamada
            // NO recargamos la página, NO destruimos el peer
            console.log('Esperando nueva llamada del operador...');
        }
        
        function showVideo() {
            document.getElementById('stateOverlay').classList.add('hidden');
            document.getElementById('reconnectingBadge').classList.remove('visible');
            document.getElementById('remoteVideo').style.opacity = '1';
        }
        
        function showReconnectingBadge() {
            document.getElementById('reconnectingBadge').classList.add('visible');
            document.getElementById('stateOverlay').classList.remove('hidden');
            document.getElementById('stateOverlay').classList.add('minimal');
            document.getElementById('mainSpinner').style.display = 'none';
            document.getElementById('statusTitle').textContent = 'Señal perdida';
            document.getElementById('statusSub').textContent = 'Esperando que el operador vuelva a conectar...';
        }
        
        function hideReconnectingBadge() {
            document.getElementById('reconnectingBadge').classList.remove('visible');
        }
        
        function updateState(title, sub, type) {
            document.getElementById('statusTitle').textContent = title;
            document.getElementById('statusSub').textContent = sub;
        }
        
        function updateTopInfo(text, className) {
            const el = document.getElementById('connState');
            el.textContent = text;
            el.className = 'state ' + className;
        }
        
        function showError(msg) {
            document.getElementById('errorBox').textContent = msg;
            document.getElementById('errorBox').style.display = 'block';
            document.getElementById('mainSpinner').style.display = 'none';
        }
        
        // Wake Lock para mantener pantalla encendida en móvil
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    const wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock activo');
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock liberado');
                        // Intentar re-adquirir si se libera (usuario volvió a la pestaña)
                        setTimeout(requestWakeLock, 1000);
                    });
                }
            } catch(e) {
                console.log('Wake Lock no disponible:', e);
            }
        }
        
        // Re-adquirir wake lock cuando la página vuelve a ser visible
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });
        
        function toggleFs() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {});
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
