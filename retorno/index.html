<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retorno P2P</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 4px solid #222; border-top-color: #ff6b00; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #broadcaster, #viewer { display: none; height: 100vh; flex-direction: column; }
        #broadcaster.active, #viewer.active { display: flex; }
        
        header { background: #111; padding: 15px; border-bottom: 2px solid #ff6b00; display: flex; justify-content: space-between; align-items: center; }
        .tag { background: #ff6b00; color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        
        .main { flex: 1; display: grid; grid-template-columns: 1fr 350px; overflow: hidden; }
        .left { padding: 20px; overflow-y: auto; }
        .right { background: #0a0a0a; border-left: 1px solid #333; padding: 20px; }
        
        .preview { background: #000; border: 2px solid #333; border-radius: 8px; aspect-ratio: 16/9; margin-bottom: 15px; position: relative; }
        .preview video { width: 100%; height: 100%; object-fit: contain; }
        .live { position: absolute; top: 10px; right: 10px; background: #ff0000; color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; display: none; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        
        button { padding: 12px 20px; background: #2a2a2a; border: none; color: #fff; border-radius: 6px; cursor: pointer; font-weight: 600; margin-right: 10px; margin-bottom: 10px; }
        button:hover { background: #3a3a3a; }
        button.primary { background: #ff6b00; color: #000; }
        button:disabled { opacity: 0.5; }
        
        input { width: 100%; padding: 12px; background: #0f0f0f; border: 1px solid #444; color: #fff; border-radius: 6px; margin-bottom: 10px; font-family: monospace; }
        
        .url-box { background: #141414; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 12px; color: #666; word-break: break-all; margin: 10px 0; border-left: 3px solid #ff6b00; }
        
        #viewer video { width: 100%; height: 100%; object-fit: contain; }
        #viewer .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #viewer .overlay.hidden { display: none; }
        
        @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div>Iniciando sistema...</div>
    </div>

    <!-- EMISOR -->
    <div id="broadcaster">
        <header>
            <h1>📡 EMISOR</h1>
            <div class="tag" id="roomTag">ROOM</div>
        </header>
        <div class="main">
            <div class="left">
                <div class="preview">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="live" id="liveBadge">🔴 EN VIVO</div>
                </div>
                <div>
                    <button onclick="start('hd')" id="btn-hd">🎥 HD 720p</button>
                    <button onclick="start('sd')" id="btn-sd">📺 SD 480p</button>
                    <button onclick="stop()" id="btn-stop" disabled style="background:#ff0000;">⏹ Detener</button>
                </div>
                <div style="margin-top: 20px; background: #141414; padding: 15px; border-radius: 8px;">
                    <strong style="color: #ff6b00;">URL para reporteros:</strong>
                    <div class="url-box" id="shareUrl"></div>
                    <button onclick="copy()" style="width: 100%;">📋 Copiar Link</button>
                </div>
            </div>
            <div class="right">
                <div style="font-size: 32px; color: #ff6b00; font-weight: bold;" id="count">0</div>
                <div style="color: #666; font-size: 12px; margin-bottom: 20px;">REPORTEROS</div>
                <div style="font-size: 13px; color: #888;" id="status">Esperando...</div>
            </div>
        </div>
    </div>

    <!-- RECEPTOR -->
    <div id="viewer">
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="overlay" id="overlay">
            <div class="spinner"></div>
            <div style="font-size: 20px; font-weight: bold; margin: 15px 0;">Conectando...</div>
            <div style="color: #888;">Esperando señal del operador</div>
            <div style="margin-top: 20px; font-size: 12px; color: #555;" id="substatus"></div>
        </div>
    </div>

    <script>
        // REEMPLAZA ESTA URL CON LA DE TU WORKER:
        const WORKER_URL = 'https://retorno.streaminghoy.workers.dev/';
        
        const params = new URLSearchParams(location.search);
        const room = params.get('room') || 'sala1';
        const isViewer = params.has('view');
        const viewRoom = params.get('view');
        
        let ws, pc, stream;
        let viewers = 0;
        
        if (isViewer) {
            document.getElementById('viewer').classList.add('active');
            document.getElementById('loader').classList.add('hidden');
            initViewer();
        } else {
            document.getElementById('broadcaster').classList.add('active');
            document.getElementById('roomTag').textContent = room;
            document.getElementById('shareUrl').textContent = location.origin + location.pathname + '?view=' + room;
            document.getElementById('loader').classList.add('hidden');
        }
        
        // EMISOR
        async function start(quality) {
            const cons = quality === 'hd' 
                ? {video: {width: 1280, height: 720, frameRate: 30}, audio: true}
                : {video: {width: 854, height: 480, frameRate: 25}, audio: true};
            
            try {
                stream = await navigator.mediaDevices.getUserMedia(cons);
                document.getElementById('localVideo').srcObject = stream;
                document.getElementById('liveBadge').style.display = 'block';
                document.getElementById('btn-hd').disabled = true;
                document.getElementById('btn-sd').disabled = true;
                document.getElementById('btn-stop').disabled = false;
                document.getElementById('status').textContent = 'Transmitiendo...';
                
                connectBroadcaster();
            } catch(e) {
                alert('Error: ' + e.message);
            }
        }
        
        function stop() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (ws) ws.close();
            if (pc) pc.close();
            document.getElementById('liveBadge').style.display = 'none';
            document.getElementById('btn-hd').disabled = false;
            document.getElementById('btn-sd').disabled = false;
            document.getElementById('btn-stop').disabled = true;
            viewers = 0;
            document.getElementById('count').textContent = 0;
        }
        
        function connectBroadcaster() {
            ws = new WebSocket(`${WORKER_URL}?room=${room}`);
            
            ws.onopen = () => {
                ws.send(JSON.stringify({type: 'register-broadcaster', room: room}));
                setupPeerBroadcaster();
            };
            
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'new-viewer') {
                    viewers++;
                    document.getElementById('count').textContent = viewers;
                    createOffer();
                }
                if (data.type === 'answer') {
                    pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
                if (data.type === 'ice-candidate') {
                    pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            };
        }
        
        function setupPeerBroadcaster() {
            pc = new RTCPeerConnection({iceServers: [{urls: 'stun:stun.l.google.com:19302'}]});
            stream.getTracks().forEach(t => pc.addTrack(t, stream));
            
            pc.onicecandidate = (e) => {
                if (e.candidate) ws.send(JSON.stringify({
                    type: 'ice-candidate', 
                    room: room,
                    candidate: e.candidate
                }));
            };
        }
        
        async function createOffer() {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify({type: 'offer', room: room, offer: offer}));
        }
        
        function copy() {
            navigator.clipboard.writeText(document.getElementById('shareUrl').textContent)
                .then(() => alert('Copiado!'));
        }
        
        // RECEPTOR
        function initViewer() {
            connectViewer();
        }
        
        function connectViewer() {
            ws = new WebSocket(`${WORKER_URL}?room=${viewRoom}`);
            
            ws.onopen = () => {
                ws.send(JSON.stringify({type: 'register-viewer', room: viewRoom}));
                document.getElementById('substatus').textContent = 'WebSocket conectado. Esperando operador...';
            };
            
            ws.onmessage = async (e) => {
                const data = JSON.parse(e.data);
                
                if (data.type === 'broadcaster-online') {
                    document.getElementById('substatus').textContent = 'Operador detectado. Recibiendo video...';
                    setupPeerViewer();
                }
                if (data.type === 'offer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    ws.send(JSON.stringify({type: 'answer', room: viewRoom, answer: answer}));
                }
                if (data.type === 'ice-candidate') {
                    if (pc) pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
                if (data.type === 'broadcaster-offline') {
                    document.getElementById('overlay').classList.remove('hidden');
                    document.querySelector('.spinner').style.display = 'none';
                    document.querySelector('#viewer .overlay div:nth-child(2)').textContent = 'Señal perdida';
                    document.querySelector('#viewer .overlay div:nth-child(3)').textContent = 'Esperando reconexión...';
                    setTimeout(() => location.reload(), 3000);
                }
            };
            
            ws.onclose = () => {
                setTimeout(() => location.reload(), 2000);
            };
        }
        
        function setupPeerViewer() {
            pc = new RTCPeerConnection({iceServers: [{urls: 'stun:stun.l.google.com:19302'}]});
            
            pc.ontrack = (e) => {
                document.getElementById('remoteVideo').srcObject = e.streams[0];
                document.getElementById('overlay').classList.add('hidden');
            };
            
            pc.onicecandidate = (e) => {
                if (e.candidate) ws.send(JSON.stringify({
                    type: 'ice-candidate',
                    room: viewRoom, 
                    candidate: e.candidate
                }));
            };
        }
    </script>
</body>
</html>
